  <title id="title">New Painting Available - Coming Soon</title>
  <desc id="desc">Placeholder tile for upcoming painting entries.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4251"/>
      <stop offset="100%" stop-color="#252b36"/>
    </linearGradient>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
