  <rect x="64" y="64" width="672" height="672" rx="20" fill="#f4f4f1" stroke="#2a2a2a" stroke-width="8"/>
  <rect x="96" y="96" width="608" height="520" fill="#d8dbe0" stroke="#aeb4bd" stroke-width="4"/>
